<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBS컴퓨터아트학원 안산점 수업일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --border: #e0e0e0;
    --accent: #f5c400;
    --text: #111;
    --muted: #888;
    --blue: #6baed6;
    --blue-bg: #c6dcef;
    --orange: #e8804a;
    --orange-bg: #f5c49e;
    --empty: #f9f9f9;
    --header-bg: #111;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; }

  header {
    background: var(--header-bg);
    border-bottom: 3px solid var(--accent);
    padding: 1.2rem 2rem;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
  .logo h1 { font-size: 1.05rem; font-weight: 900; color: var(--accent); }
  .logo p { font-size: 0.7rem; color: #888; margin-top: 0.1rem; }

  .legend { display: flex; gap: 1rem; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: #aaa; }
  .legend-dot { width: 14px; height: 14px; border-radius: 3px; }
  .legend-dot.blue { background: var(--blue-bg); border: 2px solid var(--blue); }
  .legend-dot.orange { background: var(--orange-bg); border: 2px solid var(--orange); }

  main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  /* 탭 */
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab {
    padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 700;
    border: 2px solid var(--border); background: var(--card); color: var(--muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .tab:hover { border-color: #bbb; color: var(--text); }
  .tab.active { background: var(--header-bg); color: var(--accent); border-color: var(--header-bg); }

  /* 달력 카드 */
  .cal-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .cal-top {
    background: var(--accent);
    padding: 0.7rem 1.2rem;
    text-align: center;
    font-weight: 900;
    font-size: 0.95rem;
    color: #111;
    letter-spacing: -0.01em;
  }

  .cal-weekdays {
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: #fafafa;
    border-bottom: 2px solid var(--border);
  }
  .cal-weekday {
    padding: 0.55rem; text-align: center;
    font-size: 0.78rem; font-weight: 700; color: #555;
    border-right: 1px solid var(--border);
  }
  .cal-weekday:last-child { border-right: none; }

  .cal-body { padding: 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
  .cal-week { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.4rem; }

  .cal-day {
    border-radius: 8px;
    padding: 0.65rem 0.5rem 0.55rem;
    min-height: 72px;
    display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
    border: 1.5px solid transparent;
    position: relative;
  }
  .cal-day.empty {
    background: var(--empty);
    border-color: #eee;
  }
  .cal-day.class-blue {
    background: var(--blue-bg);
    border-color: var(--blue);
  }
  .cal-day.class-orange {
    background: var(--orange-bg);
    border-color: var(--orange);
  }
  .cal-day.out { background: #f0f0f0; border-color: #e8e8e8; opacity: 0.4; }

  .day-num {
    font-size: 0.9rem; font-weight: 700;
    color: #bbb;
    align-self: flex-start; padding-left: 0.1rem;
  }
  .cal-day.class-blue .day-num { color: #2b6fa8; }
  .cal-day.class-orange .day-num { color: #b85a20; }

  .day-pill {
    font-size: 0.68rem; font-weight: 700;
    padding: 0.18rem 0.5rem; border-radius: 20px;
    color: #fff; letter-spacing: 0.02em;
  }
  .cal-day.class-blue .day-pill { background: var(--blue); }
  .cal-day.class-orange .day-pill { background: var(--orange); }

  /* 하단 범례 */
  .pat-desc {
    margin-top: 1rem;
    display: flex; gap: 0.6rem; flex-wrap: wrap;
  }
  .pat-badge {
    display: flex; align-items: center; gap: 0.4rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.8rem;
    font-size: 0.75rem; color: var(--muted);
  }
  .pat-badge .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .pat-badge .dot.blue { background: var(--blue); }
  .pat-badge .dot.orange { background: var(--orange); }

  @media (max-width: 640px) {
    main { padding: 1rem; }
    .cal-day { min-height: 56px; padding: 0.5rem 0.3rem; }
    .day-num { font-size: 0.78rem; }
    .day-pill { font-size: 0.6rem; }
    .tab { font-size: 0.75rem; padding: 0.5rem 0.8rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <h1>■ SBS컴퓨터아트학원 안산점 — 수업일정</h1>
      <p>2026년 3월 16일 ~ 4월 10일 (평일반)</p>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot blue"></div>월~목/월수금</div>
      <div class="legend-item"><div class="legend-dot orange"></div>화목금</div>
    </div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="setTab(0,this)">① 월~목 (매일)</button>
    <button class="tab" onclick="setTab(1,this)">② 저녁 9일제 + 디지털드로잉</button>
    <button class="tab" onclick="setTab(2,this)">③ 오후 10일제</button>
    <button class="tab" onclick="setTab(3,this)">④ 백엔드마스터3</button>
  </div>

  <div class="cal-wrap">
    <div class="cal-top" id="calTitle"></div>
    <div class="cal-weekdays">
      <div class="cal-weekday">월</div>
      <div class="cal-weekday">화</div>
      <div class="cal-weekday">수</div>
      <div class="cal-weekday">목</div>
      <div class="cal-weekday">금</div>
    </div>
    <div class="cal-body" id="calBody"></div>
  </div>

  <div class="pat-desc" id="patDesc"></div>
</main>

<script>
// 날짜 헬퍼
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 3/16(월) ~ 4/17(금) 주별 날짜 배열
function getWeeks() {
  const weeks = [];
  const start = new Date(2026, 2, 16);
  const end   = new Date(2026, 3, 17);
  let cur = new Date(start);
  let week = [];
  while (cur <= end) {
    const dow = cur.getDay();
    if (dow >= 1 && dow <= 5) {
      week.push(new Date(cur));
      if (dow === 5) { weeks.push([...week]); week = []; }
    }
    cur.setDate(cur.getDate() + 1);
  }
  // 마지막 주 (4/13~4/17)
  if (week.length) {
    while (week.length < 5) week.push(null);
    weeks.push(week);
  }
  return weeks;
}

// ──────────────────────────────
// 패턴 정의 (날짜 -> 색상 맵)
// ──────────────────────────────

// 공통: 3/16~4/10 평일 전체
function allWeekdays() {
  const list = [];
  const start = new Date(2026, 2, 16);
  const end   = new Date(2026, 3, 10);
  let cur = new Date(start);
  while (cur <= end) {
    if (cur.getDay() >= 1 && cur.getDay() <= 5) list.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return list;
}

// ① 월~목 매일: 월화수목 파랑, 금 없음
function pattern1() {
  const map = new Map();
  allWeekdays().forEach(d => {
    if ([1,2,3,4].includes(d.getDay())) map.set(dateKey(d), 'blue');
  });
  return map;
}

// ② 저녁 9일제 + 디지털드로잉
// 이미지2 기준: 월수금=파랑, 화목금=주황, 금은 교차(1주파/2주주황/3주파/4주없음)
// 1주(3/16~3/20): 월파 화주 수파 목주 금주
// 2주(3/23~3/27): 월파 화주 수파 목주 금파
// 3주(3/30~4/3):  월파 화주 수파 목주 금주
// 4주(4/6~4/10):  월파 화주 수파
function pattern2() {
  const map = new Map();
  const days = allWeekdays();
  const fridays = days.filter(d => d.getDay() === 5);

  days.forEach(d => {
    const dow = d.getDay();
    if ([1,3].includes(dow)) map.set(dateKey(d), 'blue');   // 월,수 → 파랑
    if ([2,4].includes(dow)) map.set(dateKey(d), 'orange'); // 화,목 → 주황
  });

  // 금요일 교차: 1주(주황), 2주(파랑), 3주(주황) — 이미지2 참고
  const friColors = ['orange', 'blue', 'orange'];
  fridays.forEach((d, i) => {
    if (i < friColors.length) map.set(dateKey(d), friColors[i]);
    // 4주 금(4/10)은 수업없음 → 설정 안 함
  });

  return map;
}

// ③ 오후 10일제
// 이미지3 기준: 월수금=파랑, 화목=주황, 금 교차
// 1주: 월파 화주 수파 목주 금파
// 2주: 월파 화주 수파 목주 금주
// 3주: 월파 화주 수파 목주 금파
// 4주: 월파 화주 수파 목주 금주
function pattern3() {
  const map = new Map();
  const days = allWeekdays();
  const fridays = days.filter(d => d.getDay() === 5);

  days.forEach(d => {
    const dow = d.getDay();
    if ([1,3].includes(dow)) map.set(dateKey(d), 'blue');
    if ([2,4].includes(dow)) map.set(dateKey(d), 'orange');
  });

  // 금요일: 1주파, 2주주황, 3주파, 4주주황
  const friColors = ['blue', 'orange', 'blue', 'orange'];
  fridays.forEach((d, i) => {
    if (i < friColors.length) map.set(dateKey(d), friColors[i]);
  });

  return map;
}

// ④ 백엔드마스터3: 이미지4 기준
// 개강 3/24(화)부터
// 3/24(화)주황, 3/26(목)주황
// 3/31(화)주황, 4/2(목)주황, 4/3(금)주황
// 4/7(화)주황, 4/9(목)주황
// 4/14(화)주황, 4/16(목)주황
function pattern4() {
  const map = new Map();
  const classDates = [
    '2026-03-24', '2026-03-26',
    '2026-03-31', '2026-04-02', '2026-04-03',
    '2026-04-07', '2026-04-09',
    '2026-04-14', '2026-04-16',
  ];
  classDates.forEach(ds => map.set(ds, 'orange'));
  return map;
}

// ──────────────────────────────
const PATTERNS = [
  {
    title: '2026년 3월 16일 ~ 4월 10일 | 월~목 매일',
    map: pattern1,
    desc: [
      { color: 'blue', text: '월·화·수·목 — 매일 수업' },
      { color: null,   text: '금요일 — 수업 없음' },
    ]
  },
  {
    title: '2026년 3월 16일 ~ 4월 10일 | 저녁 9일제 + 디지털드로잉',
    map: pattern2,
    desc: [
      { color: 'blue',   text: '월수금(월수) — 수업일' },
      { color: 'orange', text: '화목화목금 — 수업일' },
    ]
  },
  {
    title: '2026년 3월 16일 ~ 4월 10일 | 오후 10일제',
    map: pattern3,
    desc: [
      { color: 'blue',   text: '월수금월수 — 수업일' },
      { color: 'orange', text: '화목화목금 — 수업일' },
    ]
  },
  {
    title: '2026년 3월 16일 ~ 4월 17일 | 백엔드마스터3(자바2)',
    map: pattern4,
    desc: [
      { color: 'orange', text: '화목화목금 (격일) — 개강 3/24' },
    ]
  },
];

let currentTab = 0;

function setTab(idx, btn) {
  currentTab = idx;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function renderCalendar() {
  const pat = PATTERNS[currentTab];
  const classMap = pat.map();
  const weeks = getWeeks();

  document.getElementById('calTitle').textContent = pat.title;

  const body = document.getElementById('calBody');
  body.innerHTML = weeks.map(week => `
    <div class="cal-week">
      ${week.map(d => {
        if (!d) return `<div class="cal-day empty"></div>`;
        const key = dateKey(d);
        const cls = classMap.get(key);
        const dayClass = cls ? `class-${cls}` : 'empty';
        const labelMap = [
          { blue: '월~목', orange: '' },
          { blue: '월수금', orange: '화목금' },
          { blue: '월수금', orange: '화목금' },
          { blue: '', orange: '화목금' },
        ];
        const label = cls === 'blue' ? labelMap[currentTab].blue : cls === 'orange' ? labelMap[currentTab].orange : '';
        return `
          <div class="cal-day ${dayClass}">
            <span class="day-num">${d.getDate()}</span>
            ${cls ? `<span class="day-pill">${label}</span>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `).join('');

  const desc = document.getElementById('patDesc');
  desc.innerHTML = pat.desc.map(d => `
    <div class="pat-badge">
      ${d.color ? `<div class="dot ${d.color}"></div>` : '<div style="width:10px"></div>'}
      <span>${d.text}</span>
    </div>
  `).join('');
}

renderCalendar();
</script>
</body>
</html>
